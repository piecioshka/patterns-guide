<!doctype html>
<html lang="en">
  <head>
    <title>patterns-guide</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg" href="images/pattern.svg" />
    <link rel="stylesheet" href="//unpkg.com/docsify/lib/themes/vue.css" />
    <link rel="stylesheet" href="styles/custom.css" />
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.$docsify = {
        auto2top: true,
        formatUpdated: "{YYYY}-{MM}-{DD}",
        themeColor: "#3d98c9",
        loadSidebar: true,
        logo: "images/pattern.svg",
        alias: {
          "/.*/_sidebar.md": "/_sidebar.md",
        },
        name: "patterns-guide",
        repo: "",
        search: {
          placeholder: "Wpisz frazę",
          noData: "Brak wyników",
          hideOtherSidebarContent: true,
        },
        timeUpdater: {
          text: "<small style='color: grey; float: right'>Last update time: <strong>{docsify-updated}</strong></small>",
          formatUpdated: "{YYYY}-{MM}-{DD}",
          whereToPlace: "bottom",
        },
        pagination: {
          // previousText: 'Poprzedni',
          // nextText: 'Następny',
          crossChapter: true,
          crossChapterText: true,
        },
      };
    </script>
    <script src="//unpkg.com/docsify/lib/docsify.min.js"></script>
    <script src="//unpkg.com/docsify/lib/plugins/search.min.js"></script>
    <script src="//unpkg.com/docsify/lib/plugins/emoji.min.js"></script>
    <script src="//unpkg.com/docsify/lib/plugins/zoom-image.min.js"></script>
    <script src="//unpkg.com/docsify-copy-code"></script>
    <script src="//unpkg.com/docsify-updated"></script>
    <script src="//unpkg.com/docsify-pagination/dist/docsify-pagination.min.js"></script>
    <script src="scripts/dark-mode-toggle.js"></script>
  </body>
</html>
